<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanctum - Cadastro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="login-wrapper">
        <header class="login-header">
            <i class="fas fa-user-plus"></i>
            <h1>Sanctum</h1>
            <p>Criar Nova Conta</p>
        </header>

        <main class="container">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}
            
            <form action="/cadastrar" method="POST" class="login-form">

                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Ex: Maria Silva" required>
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
                </div>

                <div class="input-group">
                    <label for="usuario">Nome de Usuário</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Ex: mariasilva" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label for="confirmar_senha">Confirme a Senha</label>
                    <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login">CADASTRAR USUÁRIO</button>

                <div class="auth-switch">
                    <p>Já tem uma conta? <a href="{{ url_for('index') }}">Faça Login</a></p>
                </div>
            </form>
        </main>

        <footer class="login-footer">
            <p>&copy; 2026 - Sanctum</p>
            <p>Desenvolvido por <a href="#" target="_blank">SerejoDev</a></p>
        </footer>
    </div>

</body>

</html>
