<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanctum - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="login-wrapper">
        <header class="login-header">
            <i class="fas fa-church"></i>
            <h1>Sanctum <i class="fas fa-cross logo-cross"></i></h1>
            <p>Gestão de Repertório Litúrgico</p>
        </header>

        <main class="container">
            <!-- Bloco de Alertas (Gerenciado pelo JS agora) -->
            <div id="flash-container"></div>

            <section id="auth-section" class="login-form">
                <header class="login-header">
                    <i class="fas fa-church"></i>
                    <h1>Sanctum <i class="fas fa-cross logo-cross"></i></h1>
                    <p>Gestão de Repertório Litúrgico</p>
                </header>

                <form id="login-form">
                    <div class="input-group">
                        <label for="usuario">Usuário</label>
                        <input type="text" id="usuario" name="usuario" required>
                    </div>
                    <div class="input-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" required>
                    </div>
                    <button type="submit" class="btn-login">ACESSAR SISTEMA</button>
                </form>
            </section>

            <section id="dashboard-section" style="display: none;">
                <header class="dashboard-header">
                    <h2>Suas Playlists</h2>
                    <button id="btn-nova-playlist" class="btn-secondary">
                        <i class="fas fa-plus"></i> Nova Playlist
                    </button>
                </header>

                <ul id="playlist-list" class="playlist-container">
                    <li class="playlist-item">Carregando playlists...</li>
                </ul>
            </section>
        </main>

        <footer class="login-footer">
            <p>&copy; 2026 - Sanctum</p>
            <p>Desenvolvido por <a href="#" target="_blank">SerejoDev</a></p>
        </footer>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
