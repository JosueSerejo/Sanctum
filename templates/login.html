<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanctum - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="login-wrapper">
        <header class="login-header">
            <i class="fas fa-church"></i>
            <h1>Sanctum <i class="fas fa-cross logo-cross"></i></h1>
            <p>Gestão de Repertório Litúrgico</p>
        </header>

        <main class="container">
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }}">
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="/login" method="POST" class="login-form">

                <div class="input-group">
                    <label for="usuario">Usuário</label>
                    <!-- Adicionado o value para persistência -->
                    <input type="text" id="usuario" name="usuario" value="{{ usuario if usuario else '' }}" placeholder="Ex: mariasilva" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login">ACESSAR SISTEMA</button>

                <div class="auth-switch">
                    <p>Não tem conta? <a href="{{ url_for('cadastro') }}">Cadastre-se</a></p>
                </div>
            </form>
        </main>

        <footer class="login-footer">
            <p>&copy; 2026 - Sanctum</p>
            <p>Desenvolvido por <a href="#" target="_blank">SerejoDev</a></p>
        </footer>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
