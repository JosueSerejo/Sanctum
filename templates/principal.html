<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanctum - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="login-wrapper">
        <header class="login-header">
            <i class="fas fa-church"></i>
            <h1>Sanctum</h1>
            <p>Gestão de Repertório Litúrgico</p>
        </header>

        <main class="container">
            <form action="#" class="login-form">
                <div class="input-group">
                    <label for="usuario">Usuário</label>
                    <input type="text" id="usuario" placeholder="Ex: mariasousa" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login">ACESSAR SISTEMA</button>
            </form>
        </main>

        <footer class="login-footer">
            <p>&copy; 2026 - Sanctum</p>
            <p>Desenvolvido por <a href="" target="_blank">SerejoDev</a> </p>
        </footer>
    </div>

</body>
</html>
